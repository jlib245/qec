# configs/experiment_jung_cnn.yaml
code:
  name: "surface_code"
  distance: 3
  rounds: 3
noise:
  p_gate: 0.001
  p_meas: 0.001
  p_corr: 0.0
  p_leak: 0.0
model:
  name: "jung_cnn_low"
  kwargs:
    n_filters: 64 # 모델 내부 상수가 아닌 여기서 제어
training:
  data_mode: "offline"
  train_path: "data/train.pt"
  val_path: "data/val.pt"
  epochs: 100
  batch_size: 32
  criterion: # Loss 함수 레지스트리 설정
    name: "bce_with_logits"
    kwargs:
      reduction: "mean"
  optimizer:
    name: "Adam"
    kwargs:
      lr: 0.001
  early_stopping:
    patience: 10
  save_path: "best_model.pth"
  output_dir: "experiments/run_1"
  train_steps: null
  val_steps: null
decoder:
  name: "neural"
  weight_path: "best_model.pth"
simulation:
  shots: 10000