code:
  name: "surface_code"
  distance: 3
  rounds: 3

noise:
  name: "circuit_level"
  p: 0.001

model:
  name: "jung_cnn_low"
  kwargs: {}

training:
  data_mode: "offline"
  use_erasures: true      
  output_dir: "./results/experiment"
  epochs: 10
  train_steps: 50         
  val_steps: 10
  criterion:
    name: "BCEWithLogitsLoss"
  optimizer:
    name: "Adam"
    kwargs:
      lr: 0.001
  scheduler:
    name: "ReduceLROnPlateau"
    kwargs:
      mode: "min"
      patience: 2
  early_stopping:
    patience: 3