# [양자 코드 및 노이즈 설정]
code:
  distance: 5
  rounds: 5

noise:
  p_gate: [0.001, 0.005, 0.01]
  p_meas: 0.005
  p_corr: [0.001, 0.002]
  p_leak: [0.001, 0.01, 0.03]

# [학습 설정]
training:
  data_mode: "offline"
  train_path: "datasets/d5_complex_noise/train.npz"
  val_path: "datasets/d5_complex_noise/val.npz"
  
  # [수동 입력 필수] 적지 않거나 파일의 실제 데이터보다 크게 적으면 에러가 납니다.
  train_steps: 100000  # 학습에 사용할 데이터 개수 직접 기입
  val_steps: 10000     # 검증에 사용할 데이터 개수 직접 기입
  
  batch_size: 512
  epochs: 50
  output_dir: "results/mlp_experiment_offline"
  
  optimizer:
    name: "AdamW"
    kwargs:
      lr: 0.001
      weight_decay: 0.01
      
  scheduler:
    name: "ReduceLROnPlateau"
    kwargs:
      mode: "min"
      factor: 0.5
      patience: 3

# [모델 설정]
model:
  name: "erasure_mlp"
  kwargs:
    hidden_dim: 512

# [데이터 생성 설정] (파일이 없을 경우에만 사용)
simulation:
  shots: 100000